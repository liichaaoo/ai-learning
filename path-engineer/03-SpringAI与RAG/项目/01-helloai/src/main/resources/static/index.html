<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Hello Spring AI - Demo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", sans-serif;
            max-width: 820px; margin: 40px auto; padding: 20px;
            background: #fafafa; color: #333;
        }
        h1 { color: #007aff; }
        .subtitle { color: #888; margin-top: -10px; }
        .tabs { display: flex; gap: 4px; margin-top: 30px; }
        .tab {
            padding: 10px 18px; cursor: pointer;
            background: #eee; border-radius: 6px 6px 0 0;
            font-size: 14px; user-select: none;
        }
        .tab.active { background: #fff; font-weight: bold; color: #007aff; }
        .panel {
            background: #fff; border-radius: 0 8px 8px 8px;
            padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        input, textarea {
            width: 100%; padding: 10px 12px; margin: 8px 0;
            border: 1px solid #ddd; border-radius: 6px;
            font-size: 14px; font-family: inherit;
        }
        input:focus, textarea:focus { outline: none; border-color: #007aff; }
        button {
            background: #007aff; color: white; padding: 10px 24px;
            border: none; border-radius: 6px;
            cursor: pointer; font-size: 14px;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .output, pre {
            background: #f5f5f7; padding: 16px; border-radius: 6px;
            min-height: 120px; margin-top: 16px;
            white-space: pre-wrap; word-wrap: break-word;
            font-family: "SF Mono", Monaco, Menlo, monospace; font-size: 13px;
            border-left: 3px solid #007aff;
        }
        pre { background: #1e1e1e; color: #d4d4d4; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
        label { font-size: 13px; color: #666; display: block; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>🤖 Hello Spring AI</h1>
    <p class="subtitle">Week 1 毕业 Demo · Spring Boot 3 + Spring AI + 通义千问</p>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('stream')">💬 流式对话</div>
        <div class="tab" onclick="switchTab('expert')">🎓 专家模式</div>
        <div class="tab" onclick="switchTab('industry')">🛍️ 行业客服</div>
        <div class="tab" onclick="switchTab('recipe')">🍳 菜谱生成（结构化）</div>
    </div>

    <div class="panel">
        <!-- 流式对话 -->
        <div id="panel-stream">
            <label>你的问题</label>
            <input id="stream-q" placeholder="问点什么..." value="用一段话介绍一下你自己" />
            <button onclick="doStream()">发送（流式）</button>
            <div class="output" id="stream-out">👉 回复会一个字一个字蹦出来</div>
        </div>

        <!-- 专家模式 -->
        <div id="panel-expert" style="display:none">
            <label>向"资深 Java 架构师"提问</label>
            <input id="expert-q" placeholder="问点什么..." value="我该用 MySQL 还是 PostgreSQL？" />
            <button onclick="doExpert()">提问</button>
            <div class="output" id="expert-out"></div>
        </div>

        <!-- 行业客服 -->
        <div id="panel-industry" style="display:none">
            <label>指定行业（比如：电子产品 / 汽车 / 房产 / 美妆）</label>
            <input id="industry-name" value="电子产品" />
            <label>问题</label>
            <input id="industry-q" value="这个手机的保修期是多久？" />
            <button onclick="doIndustry()">问客服</button>
            <div class="output" id="industry-out"></div>
        </div>

        <!-- 菜谱生成 -->
        <div id="panel-recipe" style="display:none">
            <label>想做什么菜</label>
            <input id="recipe-dish" value="番茄炒蛋" />
            <button onclick="doRecipe()">生成结构化菜谱</button>
            <pre id="recipe-out">（返回会是 JSON 格式）</pre>
        </div>
    </div>

    <script>
        function switchTab(name) {
            ['stream', 'expert', 'industry', 'recipe'].forEach(n => {
                document.getElementById('panel-' + n).style.display = n === name ? 'block' : 'none';
            });
            document.querySelectorAll('.tab').forEach((el, i) => {
                const names = ['stream', 'expert', 'industry', 'recipe'];
                el.classList.toggle('active', names[i] === name);
            });
        }

        function doStream() {
            const q = document.getElementById('stream-q').value.trim();
            if (!q) return;
            const out = document.getElementById('stream-out');
            out.textContent = '';
            const src = new EventSource(`/chat/stream?q=${encodeURIComponent(q)}`);
            src.onmessage = e => out.textContent += e.data;
            src.onerror = () => src.close();
        }

        async function doExpert() {
            const q = document.getElementById('expert-q').value.trim();
            if (!q) return;
            const out = document.getElementById('expert-out');
            out.textContent = '思考中...';
            const res = await fetch(`/chat/expert?q=${encodeURIComponent(q)}`);
            out.textContent = await res.text();
        }

        async function doIndustry() {
            const industry = document.getElementById('industry-name').value.trim();
            const q = document.getElementById('industry-q').value.trim();
            const out = document.getElementById('industry-out');
            out.textContent = '思考中...';
            const res = await fetch(`/chat/industry?industry=${encodeURIComponent(industry)}&q=${encodeURIComponent(q)}`);
            out.textContent = await res.text();
        }

        async function doRecipe() {
            const dish = document.getElementById('recipe-dish').value.trim();
            const out = document.getElementById('recipe-out');
            out.textContent = '生成中...';
            const res = await fetch(`/chat/recipe?dish=${encodeURIComponent(dish)}`, { method: 'POST' });
            const json = await res.json();
            out.textContent = JSON.stringify(json, null, 2);
        }
    </script>
</body>
</html>
