<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Multi-Tools AI Assistant · Week 2</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, "PingFang SC", sans-serif; max-width: 820px; margin: 40px auto; padding: 20px; background: #fafafa; }
        h1 { color: #007aff; }
        .tabs { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 30px; }
        .tab { padding: 10px 16px; cursor: pointer; background: #eee; border-radius: 6px 6px 0 0; font-size: 13px; user-select: none; }
        .tab.active { background: #fff; font-weight: bold; color: #007aff; }
        .panel { background: #fff; border-radius: 0 8px 8px 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        input, textarea { width: 100%; padding: 10px 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: inherit; }
        button { background: #007aff; color: white; padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #0056b3; }
        .output { background: #f5f5f7; padding: 16px; border-radius: 6px; min-height: 150px; margin-top: 16px; white-space: pre-wrap; word-wrap: break-word; font-family: "SF Mono", Monaco, monospace; font-size: 13px; border-left: 3px solid #007aff; }
        label { font-size: 13px; color: #666; display: block; margin-top: 8px; }
        .hint { font-size: 12px; color: #888; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>🛠️ Multi-Tools AI Assistant</h1>
    <p style="color:#888;margin-top:-10px;">Week 2 毕业 Demo · Function Calling + 多模型 + 路由</p>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('agent')">🤖 Function Calling</div>
        <div class="tab" onclick="switchTab('model')">🌐 多模型对比</div>
        <div class="tab" onclick="switchTab('router')">🎯 智能路由</div>
        <div class="tab" onclick="switchTab('ops')">🚀 运维助手（毕业项目）</div>
    </div>

    <div class="panel">
        <div id="panel-agent">
            <label>让 AI 调工具（时间 / 订单 / 短信）</label>
            <input id="agent-q" value="查订单12345的状态，发货了告诉我物流单号" />
            <button onclick="doAgent()">问 AI</button>
            <div class="output" id="agent-out"></div>
            <div class="hint">试试：现在几点？ / 查订单12345 / 给13800001234发短信提醒发货</div>
        </div>

        <div id="panel-model" style="display:none">
            <label>问题</label>
            <input id="model-q" value="用一句话介绍 Spring AI" />
            <div style="display:flex;gap:8px">
                <button onclick="doModel('cheap')">用通义（云）</button>
                <button onclick="doModel('local')">用 Ollama（本地）</button>
            </div>
            <div class="output" id="model-out"></div>
        </div>

        <div id="panel-router" style="display:none">
            <label>路由测试（看日志观察路由决策）</label>
            <input id="router-q" value="帮我分析这份合同有什么风险" />
            <div style="display:flex;gap:8px">
                <button onclick="doRouter('auto')">按复杂度</button>
                <button onclick="doRouter('privacy')">按隐私</button>
                <button onclick="doRouter('safe')">带降级</button>
                <button onclick="doRouter('smart')">AI 分类</button>
            </div>
            <div class="output" id="router-out"></div>
            <div class="hint">试试：你好 / 帮我写快排算法 / 帮我分析合同</div>
        </div>

        <div id="panel-ops" style="display:none">
            <label>🚀 智能运维助手（流式 + 多工具 + 分析 + 建议）</label>
            <input id="ops-q" value="prod-api-01 看起来卡，你看下啥情况" />
            <button onclick="doOps()">问 OpsAgent</button>
            <div class="output" id="ops-out"></div>
            <div class="hint">
                场景：prod-api-01 状态 → 重启 prod-api-01 → CPU 高不高 → 重启 prod-db-01（白名单外）
            </div>
        </div>
    </div>

    <script>
        function switchTab(name) {
            ['agent', 'model', 'router', 'ops'].forEach(n => {
                document.getElementById('panel-' + n).style.display = n === name ? 'block' : 'none';
            });
            const names = ['agent', 'model', 'router', 'ops'];
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', names[i] === name);
            });
        }

        async function doAgent() {
            const q = document.getElementById('agent-q').value;
            const out = document.getElementById('agent-out');
            out.textContent = '思考中...（调工具可能需要几秒）';
            const res = await fetch(`/chat/agent?q=${encodeURIComponent(q)}`);
            out.textContent = await res.text();
        }

        async function doModel(which) {
            const q = document.getElementById('model-q').value;
            const out = document.getElementById('model-out');
            out.textContent = '调用 ' + which + ' 中...';
            const t0 = Date.now();
            const res = await fetch(`/chat/${which}?q=${encodeURIComponent(q)}`);
            const text = await res.text();
            const elapsed = Date.now() - t0;
            out.textContent = `[${which} · 耗时 ${elapsed} ms]\n\n${text}`;
        }

        async function doRouter(mode) {
            const q = document.getElementById('router-q').value;
            const out = document.getElementById('router-out');
            out.textContent = '路由中... 看后端日志看决策过程';
            const res = await fetch(`/chat/${mode}?q=${encodeURIComponent(q)}`);
            out.textContent = await res.text();
        }

        function doOps() {
            const q = document.getElementById('ops-q').value;
            const out = document.getElementById('ops-out');
            out.textContent = '';
            const src = new EventSource(`/ops/stream?q=${encodeURIComponent(q)}`);
            src.onmessage = e => out.textContent += e.data;
            src.onerror = () => src.close();
        }
    </script>
</body>
</html>
