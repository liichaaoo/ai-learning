server:
  port: 8080

spring:
  application:
    name: multi-tools

  ai:
    # 通义千问（OpenAI 兼容协议）
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7

    # Ollama 本地
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b
          temperature: 0.7

logging:
  level:
    org.springframework.ai: INFO
    com.fletcher.multitools: DEBUG
